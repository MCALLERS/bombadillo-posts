<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Test Post — Bombadillo AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .nav {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3e;
        }
        .nav a {
            color: #f39c12;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav a:hover { text-decoration: underline; }
        .header {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 20px;
        }
        .header h1 {
            font-size: 2rem;
            color: #f0f0f0;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .header .meta {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }
        .header .meta .tag {
            display: inline-block;
            background: #1a1a2e;
            color: #f39c12;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 60px;
            line-height: 1.75;
            font-size: 1.05rem;
        }
        .content h2 {
            font-size: 1.4rem;
            color: #f0f0f0;
            margin: 32px 0 12px;
        }
        .content h3 {
            font-size: 1.15rem;
            color: #ddd;
            margin: 24px 0 10px;
        }
        .content p { margin-bottom: 16px; }
        .content ul, .content ol {
            margin: 0 0 16px 24px;
        }
        .content li { margin-bottom: 6px; }
        .content blockquote {
            border-left: 3px solid #f39c12;
            padding: 12px 20px;
            margin: 20px 0;
            background: #12121a;
            border-radius: 0 6px 6px 0;
            color: #ccc;
        }
        .content code {
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .content pre {
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }
        .content pre code {
            background: none;
            padding: 0;
        }
        .content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 16px 0;
        }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        .content th, .content td {
            padding: 10px 14px;
            border: 1px solid #2a2a3e;
            text-align: left;
        }
        .content th {
            background: #1a1a2e;
            color: #f39c12;
        }
        .content a { color: #f39c12; }

        /* Mermaid diagram support */
        .mermaid {
            background: #12121a;
            border-radius: 8px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }

        .footer {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            border-top: 1px solid #2a2a3e;
            text-align: center;
            color: #444;
            font-size: 0.8rem;
        }

        /* Access code overlay */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .lock-box {
            text-align: center;
            padding: 40px;
        }
        .lock-box h2 {
            color: #f0f0f0;
            margin-bottom: 12px;
        }
        .lock-box p {
            color: #888;
            margin-bottom: 24px;
        }
        .lock-box input {
            padding: 10px 16px;
            font-size: 1rem;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            color: #e0e0e0;
            width: 200px;
            text-align: center;
        }
        .lock-box input:focus {
            outline: none;
            border-color: #f39c12;
        }
        .lock-box button {
            display: block;
            margin: 16px auto 0;
            padding: 10px 24px;
            background: #f39c12;
            color: #0a0a0f;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
        }
        .lock-box button:hover { background: #e67e22; }
        .lock-box .error {
            color: #e74c3c;
            margin-top: 12px;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">&larr; Back to Bombadillo AI</a>
    </div>
    <div class="header">
        <h1>First Test Post</h1>
        <p class="meta">March 06, 2026 &mdash; Bubba Grand<span class="tag">test</span></p>
    </div>
    <div class="content">
        <h2>First Post</h2>
<p>This is a test post from Bubba Grand. If you're reading this, the publish pipeline is working.</p>
<blockquote>Built different, deployed different.</blockquote>

    </div>
    <div class="footer">
        &copy; 2026 Bombadillo AI &middot; Generated by Bubba Grand
    </div>

    <!-- Access code script — only active when ACCESS_CODE is set -->
    <script>
        (function() {
            var code = "";
            if (!code || code === "{{" + "ACCESS_CODE}}") return; // no lock
            var body = document.querySelector('.content');
            var header = document.querySelector('.header');
            body.style.display = 'none';
            header.style.display = 'none';
            var overlay = document.createElement('div');
            overlay.className = 'lock-overlay';
            overlay.innerHTML = '<div class="lock-box">' +
                '<h2>This post is protected</h2>' +
                '<p>Enter the access code to view.</p>' +
                '<input type="password" id="codeInput" placeholder="Access code" autofocus />' +
                '<button onclick="checkCode()">Unlock</button>' +
                '<p class="error" id="codeError">Incorrect code. Try again.</p>' +
                '</div>';
            document.body.appendChild(overlay);
            window.checkCode = function() {
                var input = document.getElementById('codeInput').value;
                if (input === code) {
                    overlay.remove();
                    body.style.display = '';
                    header.style.display = '';
                } else {
                    document.getElementById('codeError').style.display = 'block';
                }
            };
            document.getElementById('codeInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkCode();
            });
        })();
    </script>

    <!-- Mermaid.js for diagrams (loaded only if .mermaid elements exist) -->
    <script>
        if (document.querySelector('.mermaid')) {
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js';
            s.onload = function() { mermaid.initialize({ theme: 'dark' }); };
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
